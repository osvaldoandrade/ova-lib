name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    name: Build and Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            shell: bash
            c_flags: ""
          - name: linux-x86
            os: ubuntu-latest
            shell: bash
            c_flags: "-m32"
            multilib: true
          - name: macos
            os: macos-latest
            shell: bash
            c_flags: ""
          - name: windows-mingw64
            os: windows-latest
            shell: msys2 {0}
            c_flags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-ninja

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
          if [ "${{ matrix.multilib }}" = "true" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y gcc-multilib g++-multilib libc6-dev-i386
          fi

      - name: Configure
        shell: ${{ matrix.shell }}
        run: |
          EXTRA_FLAGS=""
          if [ -n "${{ matrix.c_flags }}" ]; then
            EXTRA_FLAGS="-DCMAKE_C_FLAGS=${{ matrix.c_flags }}"
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${EXTRA_FLAGS}

      - name: Build
        shell: ${{ matrix.shell }}
        run: cmake --build build --config Release --parallel

      - name: Test
        shell: ${{ matrix.shell }}
        run: ctest --test-dir build --output-on-failure

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:strict_string_checks=1
        run: ctest --test-dir build --output-on-failure

  memcheck:
    name: Valgrind Memcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake valgrind

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Functional tests
        run: ctest --test-dir build --output-on-failure

      - name: Memcheck
        run: ctest --test-dir build -T memcheck --output-on-failure

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake lcov

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="--coverage -O0"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors unused
          lcov --remove coverage.info '/usr/*' '*/test/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info --ignore-errors unused

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --language=c \
            --std=c11 \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --quiet \
            --inline-suppr \
            --suppress=unusedFunction:src/trie/trie.c \
            --suppress=constParameterCallback:src/set/hash_set.c \
            --suppress=constParameterCallback:src/set/tree_set.c \
            --suppress=checkersReport \
            -I include \
            src include
